
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css"  media="screen">
</head>
<body class="page">
  <header class="header">
    <img class="header__img" src="./eisenhower-matrix.jpg">
    <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </header>
  <main class="main">
    <section class="main__add" id="new-task">
      <h3 for="add-item" class="main__title main__title-add" id="add-item__lable">Add Item</h3>
      <div class="main__wrapper" id="add-task">
        <input id="add-item" class="main__input" type="text">
        <button class="button" id="button__add">Add</button>
      </div>
    </section>
    <section class="todo">
      <h3 class="main__title">Todo</h3>
      <ul class="todo__block" id="task-incomplete">
        <li class="todo__wrapper">
          <input type="checkbox" class="todo__checkbox">
          <label class="todo__lable">Pay Bills</label>
          <input type="text" class="todo__input">
          <button class="button button-edit">Edit</button>
          <button class="button button-delete">
            <img class="button__delete-img" src="./remove.svg">
          </button>
        </li>
        <li class="todo__wrapper todo__wrapper-edit">
          <input type="checkbox" class="todo__checkbox">
          <label class="todo__lable">Go Shopping</label>
          <input type="text" class="todo__input" value="Go Shopping">
          <button class="button button-edit">Save</button>
          <button class="button button-delete">
            <img class="button__delete-img" src="./remove.svg">
          </button>
        </li>
      </ul>
    </section>
    <section class="completed">
      <h3 class="main__title">Completed</h3>
      <ul class="todo__block" id="task-completed">
        <li class="todo__wrapper">
          <input type="checkbox" class="todo__checkbox" checked>
          <label class="todo__lable">See the Doctor</label>
          <input type="text" class="todo__input">
          <button class="button button-edit">Edit</button>
          <button class="button button-delete">
            <img class="button__delete-img" src="./remove.svg">
          </button>
        </li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
